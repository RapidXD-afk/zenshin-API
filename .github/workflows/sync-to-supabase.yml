 name: Restore dump to Supabase

# OPTIONAL replacement for the original .github/workflows/sync-to-supabase.yml
# in your fork. Identical except the last step (clearing the ORIGINAL
# maintainer's own mappings-server caches) is removed, since you don't have
# that infrastructure and it would just fail harmlessly every run.
#
# Tradeoff vs. leaving the original file untouched: this makes your fork's
# main diverge slightly from upstream. In practice this is very low risk —
# upstream's frequent pushes are to zenshin_sql.gz, not this workflow file,
# so a future merge-upstream conflict here is unlikely — but it is a real,
# if small, possibility. If you'd rather have zero divergence risk, skip
# this file and just accept the cosmetic failed step on the original one;
# the actual Supabase restore still succeeds either way, since that step
# runs before the cache-clear step.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "zenshin_sql.gz"

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres client
        run: sudo apt-get install postgresql-client

      - name: Verify dump file exists
        run: |
          if [ ! -f zenshin_sql.gz ]; then
            echo "Dump file not found!"
            exit 1
          fi
          echo "Dump file found."

      - name: Decompress dump
        run: |
          gzip -d -k zenshin_sql.gz
          if [ ! -f zenshin_sql ]; then
            echo "Decompression failed!"
            exit 1
          fi
          echo "Decompression successful."

      - name: Check pg_restore version
        run: pg_restore --version

      - name: Restore dump to Supabase
        env:
          SUPABASE_CONN: ${{ secrets.SUPABASE_CONNECTION }}
          PGSSLMODE: require
        run: |
          echo "Dropping store table..."
          psql "$SUPABASE_CONN" -c "DROP TABLE IF EXISTS public.store CASCADE;"
          if [ $? -ne 0 ]; then
            echo "Error dropping table. Exiting..."
            exit 1
          fi

          echo "Restoring schema (schema-only)..."
          psql "$SUPABASE_CONN" -f zenshin_sql
          if [ $? -ne 0 ]; then
            echo "Error restoring schema. Exiting..."
            exit 1
          fi

          echo "Restore complete."

      - name: Grant PostgREST access
        env:
          SUPABASE_CONN: ${{ secrets.SUPABASE_CONNECTION }}
          PGSSLMODE: require
        run: |
          # Supabase projects created after May 30 2026 need explicit grants
          # for the auto-REST API (PostgREST) to read a freshly restored
          # table -- without this, every restore would silently re-lock the
          # table down and your API would start returning empty results
          # again after each sync.
          psql "$SUPABASE_CONN" -c "GRANT SELECT ON public.store TO anon;"
          psql "$SUPABASE_CONN" -c "GRANT SELECT ON public.store TO authenticated;"
